<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <title>Express Chat</title>
  <link type="text/css" rel="stylesheet" href="//unpkg.com/bootstrap/dist/css/bootstrap.min.css" />
  <link type="text/css" rel="stylesheet" href="//unpkg.com/bootstrap-vue@latest/dist/bootstrap-vue.min.css" />

</head>
<body>
  <div id="app">

    <b-container>
      <div class="text-center">
        <h1>Express Chat</h1>
      </div>
  
      <b-form>
        <b-form-group
          id="input-group"
          label="Message"
          label-for="input-message"
          description="Write something nice"
        >
          <b-form-input
            id="input-message"
            type="text"
            v-model="message"
            required
          ></b-form-input>
        </b-form-group>
  
        <b-button type="button" variant="primary" @click="send">Send</b-button>
      </b-form>

      <b-list-group class="mt-2" v-if="messages.length">
        <b-list-group-item v-for="message of messages.slice().reverse()">{{ message }}</b-list-group-item>
      </b-list-group>
    </b-container>
  </div>
  
  <script src="//unpkg.com/vue@latest/dist/vue.min.js"></script>
  <script src="//unpkg.com/bootstrap-vue@latest/dist/bootstrap-vue.min.js"></script>
  <script src="//unpkg.com/axios/dist/axios.min.js"></script>
  <script src="//cdnjs.cloudflare.com/ajax/libs/socket.io/2.2.0/socket.io.js"></script>

  <script type="module" src="js/app.js"></script>
</body>
</html>
